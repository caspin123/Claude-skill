name: Download UI/UX Skill via Claude

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'download-uiux-skill.sh'

jobs:
  download-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download skill
        timeout-minutes: 5
        run: |
          GIT_TERMINAL_PROMPT=0 bash download-uiux-skill.sh || {
            echo "Download failed or timed out, using cached skill files"
          }

      - name: Verify install
        run: |
          if [ -f ".claude/skills/ui-ux-pro-max/SKILL.md" ]; then
            echo "SKILL.md found - install OK"
          else
            echo "ERROR: SKILL.md not found"
            exit 1
          fi

      - name: Commit skill files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/ || true
          git diff --cached --quiet || git commit -m "ci: update UI/UX Pro Max skill files"
          git push || true
