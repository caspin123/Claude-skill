name: Download UI/UX Skill via Claude

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'download-uiux-skill.sh'

jobs:
  download-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run download script
        run: bash download-uiux-skill.sh

      - name: Verify with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install --quiet anthropic
          python3 verify.py

      - name: Commit skill files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/ || true
          git diff --cached --quiet || git commit -m "ci: update UI/UX Pro Max skill files"
          git push || true
